name: Documentation

on:
  push:
    branches:
      - master
    tags: ['*']
  pull_request:

# Allow the default GITHUB_TOKEN to push the built docs to gh-pages, so the
# deploy no longer depends on the (expired) DOCUMENTER_KEY SSH secret.
permissions:
  contents: write
  pull-requests: read
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          # Token-based deploy (no SSH key needed). Documenter falls back to
          # DOCUMENTER_KEY only if it is set; we intentionally omit it.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: julia --project=docs/ --color=yes docs/make.jl
