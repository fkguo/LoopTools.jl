name: TagBot
on:
  issue_comment:
    types:
      - created
  workflow_dispatch:
jobs:
  TagBot:
    if: github.event_name == 'workflow_dispatch' || github.actor == 'JuliaTagBot'
    runs-on: ubuntu-latest
    steps:
      - uses: JuliaRegistries/TagBot@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Create tags/releases via the API token. (The previous
          # `ssh: ${{ secrets.DOCUMENTER_KEY }}` relied on an SSH deploy key
          # that is no longer valid, which made TagBot fail and open a
          # "manual intervention needed" issue instead of releasing.)